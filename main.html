<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

  <div class="quiz-container" id="quiz">
    <div class="quiz-header">
      <h2 id="question">Question text</h2>
    </div>
    <div class="quiz-options">
      <div class="option">
        <input type="radio" id="a" name="answer">
        <label id="a_text" for="a">Option A</label>
      </div>
      <div class="option">
        <input type="radio" id="b" name="answer">
        <label id="b_text" for="b">Option B</label>
      </div>
      <div class="option">
        <input type="radio" id="c" name="answer">
        <label id="c_text" for="c">Option C</label>
      </div>
      <div class="option">
        <input type="radio" id="d" name="answer">
        <label id="d_text" for="d">Option D</label>
      </div>
    </div>
    <button id="submit">Submit</button>
  </div>

  <script type="text/javascript" src="./script.js"></script>

</body>

</html>
